name: Generate & Deploy Report

on:
  push:
    branches: [main]
  # Hourly schedule disabled 2026-07-24: RDS is unreachable from the SSH bastion,
  # causing repeated failure notification emails. Re-enable after AWS/RDS network
  # access from cs_jumpbox_sg to the RDS security group on TCP 3306 is restored.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-client
          pip install pymysql azure-storage-blob requests openpyxl

      - name: Set up SSH tunnel
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.TUNNEL_HOST }}
          PORT: ${{ secrets.TUNNEL_PORT }}
          USER: ${{ secrets.TUNNEL_USER }}
          RDS: ${{ secrets.RDS_HOST }}
        run: |
          set -e
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$PORT" "$HOST" > ~/.ssh/known_hosts 2>/dev/null
          ssh -f -N -L 3307:${RDS}:3306 \
            -p "$PORT" "$USER@$HOST" \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=60 \
            -o ExitOnForwardFailure=yes
          echo "Tunnel established"

      - name: Generate report
        timeout-minutes: 5
        env:
          CUSTIMOO_DB_PASSWORD: ${{ secrets.CUSTIMOO_DB_PASSWORD }}
          CUSTIMOO_GRAPH_TENANT_ID: ${{ secrets.CUSTIMOO_GRAPH_TENANT_ID }}
          CUSTIMOO_GRAPH_CLIENT_ID: ${{ secrets.CUSTIMOO_GRAPH_CLIENT_ID }}
          CUSTIMOO_GRAPH_CLIENT_SECRET: ${{ secrets.CUSTIMOO_GRAPH_CLIENT_SECRET }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          python3 scripts/html_report.py
          test -s report.html
          echo "Report: $(wc -c < report.html) bytes"

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy -a custimoo-defect-report-lars --remote-only
